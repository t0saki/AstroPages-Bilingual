name: Gallery thumbnails

# When a gallery post changes, regenerate thumbnails + manifest and commit them
# back to main. That bot commit triggers a second Cloudflare build which picks
# up the new thumbnails (the "double build" — the first build renders any new
# photo from its original URL as a fallback until this lands).
#
# NOTE: this requires the image host to serve GitHub Actions runners. i.tsk.im
# sits behind Cloudflare bot protection — a WAF Skip rule (or Bot Fight Mode
# off) for the image path is needed, else fetches get HTTP 403.
on:
  push:
    branches: [main]
    # Only post edits change which images the gallery collects. The bot commit
    # below touches src/data/ + public/gallery/ (not this path), so it never
    # re-triggers this workflow — and GITHUB_TOKEN pushes don't recurse.
    paths:
      - "src/content/posts/**"
  workflow_dispatch:

permissions:
  contents: write

# Serialize runs so concurrent commits don't race on the push. Don't cancel an
# in-flight run — a half-generated commit is worse than waiting.
concurrency:
  group: gallery-thumbs
  cancel-in-progress: false

jobs:
  thumbnails:
    name: Generate gallery thumbnails
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: "☁️ Checkout repository"
        uses: actions/checkout@v4

      # ffmpeg (SVT-AV1) downscales HDR (PQ/HLG) AVIF while keeping it 10-bit +
      # HDR-tagged, and is the decode fallback for AVIFs sharp can't read;
      # libavif-bin/imagemagick are extra decode fallbacks. ffmpeg comes from
      # BtbN's latest master static build instead of apt: Ubuntu 24.04 ships
      # ffmpeg 6.1 with a 2023-era SVT-AV1, which encodes worse and slower and
      # predates the HEIF irot display-matrix handling.
      - name: "🖼️ Install image toolchain"
        run: |
          sudo apt-get update && sudo apt-get install -y libavif-bin imagemagick libimage-exiftool-perl
          curl -fsSL -o /tmp/ffmpeg.tar.xz \
            https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz
          tar -xf /tmp/ffmpeg.tar.xz -C /tmp
          sudo install /tmp/ffmpeg-master-latest-linux64-gpl/bin/ffmpeg /tmp/ffmpeg-master-latest-linux64-gpl/bin/ffprobe /usr/local/bin/
          ffmpeg -version | head -1

      - name: "📦 Install pnpm"
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.1

      - name: "⬢ Use Node.js (from .nvmrc)"
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: "📦 Install dependencies"
        run: pnpm install

      # Don't fail the job yet: a few unreachable images shouldn't block
      # committing the thumbnails that did generate. We surface it at the end.
      - name: "🏞️ Generate thumbnails + manifest"
        id: generate
        continue-on-error: true
        run: node scripts/generate-gallery-thumbs.mjs

      - name: "💾 Commit generated files"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/gallery-manifest.json 2>/dev/null || true
          git add public/gallery/thumbs 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No gallery changes to commit."
            exit 0
          fi
          # No [skip ci]: the resulting push must trigger the second Workers build.
          git commit -m "chore(gallery): regenerate thumbnails + manifest"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: "🚦 Surface generation failures"
        if: steps.generate.outcome == 'failure'
        run: |
          echo "::error::Thumbnail generation reported failures — see the generate step log."
          exit 1
